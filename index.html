<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZBAPP Premium Console</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #17212b; /* Native Telegram Dark Theme BG */
            color: #f5f5f5;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .app-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 10px;
        }
        .header-section {
            text-align: center;
            padding: 10px 0;
        }
        .logo-badge {
            background: linear-gradient(135deg, #2481cc, #0056b3);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 10px;
        }
        h2 { margin: 0; color: #fff; font-size: 24px; font-weight: 600; }
        p.subtitle { margin: 6px 0 0 0; color: #708499; font-size: 14px; }
        
        .card {
            background: #242f3d; /* Telegram Dark Card BG */
            padding: 20px;
            border-radius: 14px;
            border: 1px solid #2f3e4e;
        }
        label {
            display: block;
            color: #5288c1;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        input {
            width: 100%;
            background: #17212b;
            border: 1px solid #2f3e4e;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            color: #fff;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #5288c1;
        }
        button {
            width: 100%;
            background: #2481cc; /* Telegram Brand Blue */
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
        button:active {
            background: #1c66a3;
        }
        .result-panel {
            display: none;
            background: #1e2733;
            border-radius: 12px;
            border-left: 4px solid #2481cc;
            padding: 16px;
        }
        .status-message {
            color: #64b5f6;
            font-size: 14px;
            text-align: center;
        }
        .error-message {
            color: #e57373;
            background: rgba(229, 115, 115, 0.1);
            border-left-color: #e57373;
        }
        pre {
            margin: 10px 0 0 0;
            background: #111822;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 12px;
            color: #81c784; /* Terminal Green output */
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-section">
            <span class="logo-badge">Console v2.0</span>
            <h2>ZBAPP Link Engine</h2>
            <p class="subtitle">Automated Payload Link Stitching</p>
        </div>

        <div class="card">
            <label for="urlInput">Target Destination URL</label>
            <input type="text" id="urlInput" placeholder="Paste supported product link here...">
            <button onclick="processPayload()">Generate Payload Structure</button>
        </div>

        <div id="resultPanel" class="result-panel">
            <div id="statusContent"></div>
        </div>
    </div>

    <script>
        async function processPayload() {
            const inputUrl = document.getElementById('urlInput').value.trim();
            const panel = document.getElementById('resultPanel');
            const content = document.getElementById('statusContent');
            
            if (!inputUrl) {
                panel.style.display = "block";
                panel.className = "result-panel error-message";
                content.innerHTML = `<strong>Input Required:</strong> Please paste a product link first.`;
                return;
            }

            panel.style.display = "block";
            panel.className = "result-panel";
            content.innerHTML = `<div class="status-message">⚡ Executing cloud calculation...</div>`;

            try {
                const response = await fetch('https://zbapp-backend.onrender.com/api/build-payload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ targetUrl: inputUrl })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    panel.className = "result-panel";
                    content.innerHTML = `
                        <label style="color: #81c784;">✓ Generation Successful</label>
                        <pre>${JSON.stringify(data.payload, null, 2)}</pre>
                    `;
                } else {
                    panel.className = "result-panel error-message";
                    content.innerHTML = `<strong>Server Refusal:</strong> ${data.error || 'Failed to process.'}`;
                }
            } catch (err) {
                panel.className = "result-panel error-message";
                content.innerHTML = `<strong>Network Failure:</strong> Cloud backend engine unreachable.`;
                console.error(err);
            }
        }
    </script>

</body>
</html>
